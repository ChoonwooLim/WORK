<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemoteAGT — 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #1a1f35;
            --border: rgba(255, 255, 255, 0.06);
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --cyan: #06b6d4;
            --text: #e2e8f0;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --font: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(6, 182, 212, 0.06) 0%, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 12px var(--accent-glow));
        }

        .login-logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-light), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .tab-bar {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            font-family: var(--font);
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-submit:hover {
            background: var(--accent-light);
            box-shadow: 0 4px 16px var(--accent-glow);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.2);
            color: var(--success);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 16px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .hint {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }

        #form-register {
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-logo">
            <span class="icon">🪐</span>
            <h1>RemoteAGT</h1>
            <p>AI 원격 지휘·통제 시스템</p>
        </div>

        <div class="login-card">
            <div class="tab-bar">
                <button class="tab-btn active" onclick="switchTab('login')">로그인</button>
                <button class="tab-btn" onclick="switchTab('register')">회원가입</button>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>

            <!-- Login Form -->
            <form id="form-login" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="login-email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" id="login-btn">로그인</button>
            </form>

            <!-- Register Form -->
            <form id="form-register" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>사용자명</label>
                    <input type="text" id="reg-username" placeholder="홍길동" required>
                </div>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="reg-email" placeholder="user@example.com" required>
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="reg-password" placeholder="6자 이상" minlength="6" required>
                </div>
                <button type="submit" class="btn-submit" id="reg-btn">회원가입</button>
            </form>

            <div class="hint">
                <p>첫 번째 가입자는 자동으로 <strong>최상위 관리자</strong>가 됩니다.</p>
            </div>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('ragt_token');
        if (token) {
            fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } })
                .then(r => { if (r.ok) window.location.href = '/dashboard'; })
                .catch(() => { });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
            hideMessages();
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success-msg').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('success-msg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';
        }
        function hideMessages() {
            document.getElementById('error-msg').style.display = 'none';
            document.getElementById('success-msg').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('login-email').value,
                        password: document.getElementById('login-password').value,
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || '로그인 실패');
                    return;
                }

                localStorage.setItem('ragt_token', data.token);
                localStorage.setItem('ragt_user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } catch (err) {
                showError('서버 연결에 실패했습니다.');
            } finally {
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideMessages();
            const btn = document.getElementById('reg-btn');
            btn.disabled = true;
            btn.textContent = '가입 중...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('reg-username').value,
                        email: document.getElementById('reg-email').value,
                        password: document.getElementById('reg-password').value,
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || '가입 실패');
                    return;
                }

                localStorage.setItem('ragt_token', data.token);
                localStorage.setItem('ragt_user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } catch (err) {
                showError('서버 연결에 실패했습니다.');
            } finally {
                btn.disabled = false;
                btn.textContent = '회원가입';
            }
        }
    </script>
</body>

</html>
