# Default server - shows available projects
server {
    listen 80 default_server;
    server_name localhost;

    location / {
        default_type text/html;
        return 200 '<!DOCTYPE html>
<html>
<head><title>Dev Server</title>
<style>
body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; background: #1a1a2e; color: #eee; }
h1 { color: #e94560; }
a { color: #0f3460; text-decoration: none; }
.card { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #e94560; }
</style>
</head>
<body>
<h1>🚀 Dev Server</h1>
<div class="card"><strong>pgAdmin</strong> - <a href="http://localhost:5050" style="color:#e94560">:5050</a></div>
<div class="card"><strong>PostgreSQL</strong> - localhost:5432</div>
<p style="color:#666">프로젝트를 추가하려면 nginx/conf.d/ 에 설정 파일을 추가하세요.</p>
</body></html>';
    }
}

